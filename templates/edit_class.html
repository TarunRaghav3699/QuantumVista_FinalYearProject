{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="mb-3">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-edit fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Edit Subject / Class</h2>
                    <p class="text-muted">Modify the details of this generated class</p>
                </div>
                
                <form method="POST" action="{{ url_for('edit_class', class_id=cls.class_id) }}">
                    <div class="mb-3">
                        <label class="form-label text-muted">Subject & Topic Info</label>
                        <input type="text" class="form-control" name="name" value="{{ cls.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Degree & Semester Details</label>
                        <input type="text" class="form-control" name="college" value="{{ cls.college }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted">Scheduled Date & Time <small>(Re-select if you wish to change)</small></label>
                        <input type="datetime-local" class="form-control" name="date_time" value="{{ cls.date_time }}">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        <i class="fas fa-save me-2"></i>Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
