<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Attendance - Level Up{% endblock %}</title>
    <!-- Modern Enterprise Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light-mesh">
    <nav class="navbar navbar-expand-lg navbar-dark premium-nav py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 premium-brand" href="#">
                <i class="fas fa-qrcode me-2"></i>
                KRMU Smart Attendance
            </a>
            <div class="navbar-nav ms-auto align-items-center flex-row">
                <!-- Animated Theme Toggle -->
                <button id="themeToggle" class="btn btn-dark-mode-toggle shadow-none border-0 px-2 me-3 fs-5" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon align-middle"></i>
                </button>
                {% if session.username %}
                <span class="navbar-text me-3 d-none d-md-block text-white opacity-75 fw-medium">Welcome, {{ session.name or session.username }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm rounded-pill fw-bold px-3">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Dark Mode Logic Driver
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Check local storage for persistent preference
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
        }

        themeToggle.addEventListener('click', () => {
            // Apply a rapid scale pop effect to the button when clicked
            themeToggle.style.transform = "rotate(180deg) scale(0.6)";
            setTimeout(() => themeToggle.style.transform = "", 300);
            
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
